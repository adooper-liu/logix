<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>甘特图圆点诊断工具</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      border-bottom: 2px solid #409eff;
      padding-bottom: 10px;
    }
    h2 {
      color: #409eff;
      margin-top: 30px;
    }
    .section {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fafafa;
    }
    .stat {
      display: inline-block;
      margin: 5px 10px;
      padding: 8px 12px;
      background: #409eff;
      color: white;
      border-radius: 4px;
      font-weight: bold;
    }
    .stat.error {
      background: #f56c6c;
    }
    .stat.warning {
      background: #e6a23c;
    }
    .stat.success {
      background: #67c23a;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
    }
    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }
    th {
      background: #f5f7fa;
      font-weight: bold;
    }
    .container-item {
      background: white;
      padding: 10px;
      margin: 5px 0;
      border-left: 3px solid #409eff;
    }
    button {
      padding: 8px 16px;
      background: #409eff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #66b1ff;
    }
    .log {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .error { color: #f56c6c; }
    .warning { color: #e6a23c; }
    .success { color: #67c23a; }
    .info { color: #409eff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 甘特图圆点诊断工具</h1>
    
    <div class="section">
      <h2>步骤 1：检查后端服务</h2>
      <button onclick="checkBackend()">检查后端连接</button>
      <button onclick="fetchContainers()">获取货柜数据</button>
      <button onclick="fetchStatistics()">获取统计数据</button>
      <div id="backend-status" class="log">等待检查...</div>
    </div>

    <div class="section">
      <h2>步骤 2：数据统计</h2>
      <div id="stats-container"></div>
    </div>

    <div class="section">
      <h2>步骤 3：货柜样本分析</h2>
      <div>
        <label>显示前</label>
        <select id="sample-count">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="20">20</option>
        </select>
        <label>个货柜</label>
        <button onclick="showSamples()">显示样本</button>
      </div>
      <div id="samples-container"></div>
    </div>

    <div class="section">
      <h2>步骤 4：日期匹配诊断</h2>
      <button onclick="diagnoseDateMatching()">诊断日期匹配</button>
      <div id="date-matching-log" class="log">等待诊断...</div>
    </div>

    <div class="section">
      <h2>步骤 5：分组诊断</h2>
      <button onclick="diagnoseGrouping()">诊断分组逻辑</button>
      <div id="grouping-log" class="log">等待诊断...</div>
    </div>
  </div>

  <script>
    let containers = [];
    let statistics = null;

    const API_BASE = 'http://localhost:3001/api/v1';

    async function checkBackend() {
      const log = document.getElementById('backend-status');
      try {
        log.innerHTML = '<span class="info">正在检查后端连接...</span>';
        const response = await fetch(`${API_BASE}/health`);
        if (response.ok) {
          log.innerHTML = '<span class="success">✓ 后端服务正常</span>';
        } else {
          log.innerHTML = `<span class="error">✗ 后端返回状态码: ${response.status}</span>`;
        }
      } catch (error) {
        log.innerHTML = `<span class="error">✗ 无法连接到后端: ${error.message}</span>`;
      }
    }

    async function fetchContainers() {
      const log = document.getElementById('backend-status');
      try {
        log.innerHTML = '<span class="info">正在获取货柜数据...</span>';
        const response = await fetch(`${API_BASE}/containers?page=1&pageSize=10`);
        const data = await response.json();
        if (data.success && data.data?.items) {
          containers = data.data.items;
          log.innerHTML = `<span class="success">✓ 获取到 ${containers.length} 个货柜</span>`;
          showStats();
        } else {
          log.innerHTML = `<span class="error">✗ 获取货柜数据失败</span>`;
        }
      } catch (error) {
        log.innerHTML = `<span class="error">✗ 获取货柜数据错误: ${error.message}</span>`;
      }
    }

    async function fetchStatistics() {
      const log = document.getElementById('backend-status');
      try {
        log.innerHTML = '<span class="info">正在获取统计数据...</span>';
        const startDate = new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0];
        const endDate = new Date(new Date().getFullYear(), 11, 31).toISOString().split('T')[0];
        const response = await fetch(`${API_BASE}/containers/statistics-detailed?startDate=${startDate}&endDate=${endDate}`);
        const data = await response.json();
        if (data.success && data.data) {
          statistics = data.data;
          log.innerHTML = `<span class="success">✓ 获取到统计数据</span>`;
          showStats();
        } else {
          log.innerHTML = `<span class="error">✗ 获取统计数据失败</span>`;
        }
      } catch (error) {
        log.innerHTML = `<span class="error">✗ 获取统计数据错误: ${error.message}</span>`;
      }
    }

    function showStats() {
      const container = document.getElementById('stats-container');
      let html = `
        <div class="stat">货柜总数: ${containers.length}</div>
      `;

      if (statistics) {
        html += '<h3>按到港分布</h3>';
        for (const [key, value] of Object.entries(statistics.arrivalDistribution || {})) {
          html += `<div class="stat">${key}: ${value}</div>`;
        }

        html += '<h3>按提柜计划分布</h3>';
        for (const [key, value] of Object.entries(statistics.pickupDistribution || {})) {
          html += `<div class="stat">${key}: ${value}</div>`;
        }

        html += '<h3>按最晚提柜分布</h3>';
        for (const [key, value] of Object.entries(statistics.lastPickupDistribution || {})) {
          html += `<div class="stat">${key}: ${value}</div>`;
        }

        html += '<h3>按最晚还箱分布</h3>';
        for (const [key, value] of Object.entries(statistics.returnDistribution || {})) {
          html += `<div class="stat">${key}: ${value}</div>`;
        }
      }

      container.innerHTML = html;
    }

    function showSamples() {
      const count = parseInt(document.getElementById('sample-count').value);
      const container = document.getElementById('samples-container');
      const samples = containers.slice(0, count);

      let html = '<table><tr><th>柜号</th><th>物流状态</th><th>ATA</th><th>ETA</th><th>目的港</th><th>港口操作数</th><th>拖卡记录数</th><th>还箱记录数</th></tr>';

      for (const c of samples) {
        html += `
          <tr>
            <td>${c.containerNumber || c.container_number || '-'}</td>
            <td>${c.logisticsStatus || c.logistics_status || '-'}</td>
            <td>${c.ataDestPort || c.ata_dest_port || '-'}</td>
            <td>${c.etaDestPort || c.eta_dest_port || '-'}</td>
            <td>${c.destinationPort || c.dest_port || '-'}</td>
            <td>${c.portOperations?.length || 0}</td>
            <td>${c.truckingTransports?.length || 0}</td>
            <td>${c.emptyReturns?.length || 0}</td>
          </tr>
        `;
      }

      html += '</table>';
      container.innerHTML = html;
    }

    function diagnoseDateMatching() {
      const log = document.getElementById('date-matching-log');
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let output = '=== 日期匹配诊断 ===\n\n';

      let hasAta = 0;
      let hasEta = 0;
      let hasNoDates = 0;
      let ataMatchToday = 0;
      let etaMatchToday = 0;

      for (const c of containers) {
        const ata = c.ataDestPort || c.ata_dest_port;
        const eta = c.etaDestPort || c.eta_dest_port;

        if (ata) {
          hasAta++;
          const ataDate = new Date(ata);
          ataDate.setHours(0, 0, 0, 0);
          if (ataDate.getTime() === today.getTime()) {
            ataMatchToday++;
          }
        }
        if (eta) {
          hasEta++;
          const etaDate = new Date(eta);
          etaDate.setHours(0, 0, 0, 0);
          if (etaDate.getTime() === today.getTime()) {
            etaMatchToday++;
          }
        }
        if (!ata && !eta) {
          hasNoDates++;
        }
      }

      output += `总货柜数: ${containers.length}\n`;
      output += `有ATA: ${hasAta}\n`;
      output += `有ETA: ${hasEta}\n`;
      output += `无日期: ${hasNoDates}\n`;
      output += `ATA等于今日: ${ataMatchToday}\n`;
      output += `ETA等于今日: ${etaMatchToday}\n`;
      output += `\n今日日期: ${today.toISOString().split('T')[0]}\n`;

      log.innerHTML = `<span class="info">${escapeHtml(output)}</span>`;
    }

    function diagnoseGrouping() {
      const log = document.getElementById('grouping-log');
      let output = '=== 分组逻辑诊断 ===\n\n';

      // 按物流状态分组
      const statusGroups = {};
      for (const c of containers) {
        const status = c.logisticsStatus || c.logistics_status || 'unknown';
        statusGroups[status] = (statusGroups[status] || 0) + 1;
      }

      output += '物流状态分布:\n';
      for (const [status, count] of Object.entries(statusGroups)) {
        output += `  ${status}: ${count}\n`;
      }

      // 按港口类型分组
      output += '\n当前港口类型:\n';
      const portTypeGroups = {};
      for (const c of containers) {
        const portType = c.currentPortType || 'unknown';
        portTypeGroups[portType] = (portTypeGroups[portType] || 0) + 1;
      }
      for (const [portType, count] of Object.entries(portTypeGroups)) {
        output += `  ${portType}: ${count}\n`;
      }

      log.innerHTML = `<span class="info">${escapeHtml(output)}</span>`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
