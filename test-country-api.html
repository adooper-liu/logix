<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国家API测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .test-section {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      background: #f9f9f9;
    }
    .test-section h2 {
      margin-top: 0;
      color: #333;
    }
    .result {
      background: white;
      padding: 15px;
      border-radius: 4px;
      border-left: 4px solid #4CAF50;
      margin-top: 10px;
    }
    .error {
      border-left-color: #f44336;
      background: #ffebee;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
    }
    button:hover {
      background: #45a049;
    }
    button.secondary {
      background: #2196F3;
    }
    button.secondary:hover {
      background: #0b7dda;
    }
    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
    }
    .status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 10px;
    }
    .status.success {
      background: #4CAF50;
      color: white;
    }
    .status.error {
      background: #f44336;
      color: white;
    }
    .status.pending {
      background: #ff9800;
      color: white;
    }
  </style>
</head>
<body>
  <h1>🌍 国家筛选API测试</h1>

  <div class="test-section">
    <h2>1. 测试国家列表API</h2>
    <button onclick="testCountriesAPI()">测试 /api/v1/countries</button>
    <button class="secondary" onclick="clearResult('result1')">清除结果</button>
    <div id="result1"></div>
  </div>

  <div class="test-section">
    <h2>2. 测试货柜列表API（带国家筛选）</h2>
    <button onclick="testContainersAPI('US')">筛选美国</button>
    <button onclick="testContainersAPI('GB')">筛选英国</button>
    <button onclick="testContainersAPI('')">筛选全部国家</button>
    <button class="secondary" onclick="clearResult('result2')">清除结果</button>
    <div id="result2"></div>
  </div>

  <div class="test-section">
    <h2>3. 测试统计API（带国家筛选）</h2>
    <button onclick="testStatisticsAPI('US')">美国统计</button>
    <button onclick="testStatisticsAPI('GB')">英国统计</button>
    <button onclick="testStatisticsAPI('')">全部统计</button>
    <button class="secondary" onclick="clearResult('result3')">清除结果</button>
    <div id="result3"></div>
  </div>

  <div class="test-section">
    <h2>4. 直接查询数据库国家数据</h2>
    <button onclick="testDatabaseQuery()">查询数据库</button>
    <button class="secondary" onclick="clearResult('result4')">清除结果</button>
    <div id="result4"></div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3001/api/v1';

    async function testCountriesAPI() {
      const resultDiv = document.getElementById('result1');
      resultDiv.innerHTML = '<div class="result"><span class="status pending">测试中...</span> 正在调用 /api/v1/countries</div>';

      try {
        const response = await fetch(`${API_BASE_URL}/countries`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        const data = await response.json();
        
        if (response.ok && data.success) {
          const countries = data.data || [];
          resultDiv.innerHTML = `
            <div class="result">
              <span class="status success">成功</span>
              <h3>✅ API调用成功</h3>
              <p><strong>返回国家数量:</strong> ${countries.length}</p>
              <p><strong>前10个国家:</strong></p>
              <pre>${JSON.stringify(countries.slice(0, 10), null, 2)}</pre>
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="result error">
              <span class="status error">失败</span>
              <h3>❌ API返回错误</h3>
              <p><strong>状态码:</strong> ${response.status}</p>
              <p><strong>响应:</strong></p>
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
        }
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <span class="status error">错误</span>
            <h3>❌ 网络错误</h3>
            <p><strong>错误信息:</strong> ${error.message}</p>
            <p><strong>可能的原因:</strong></p>
            <ul>
              <li>后端服务未启动</li>
              <li>API地址不正确: ${API_BASE_URL}</li>
              <li>CORS跨域问题</li>
              <li>网络连接问题</li>
            </ul>
          </div>
        `;
      }
    }

    async function testContainersAPI(countryCode) {
      const resultDiv = document.getElementById('result2');
      const countryText = countryCode ? `国家筛选: ${countryCode}` : '全部国家';
      resultDiv.innerHTML = `<div class="result"><span class="status pending">测试中...</span> 正在查询货柜列表 (${countryText})</div>`;

      try {
        const headers = {
          'Content-Type': 'application/json'
        };
        if (countryCode) {
          headers['X-Country-Code'] = countryCode;
        }

        const response = await fetch(`${API_BASE_URL}/containers`, {
          method: 'GET',
          headers: headers
        });

        const data = await response.json();
        
        if (response.ok && data.success) {
          const containers = data.data || [];
          resultDiv.innerHTML = `
            <div class="result">
              <span class="status success">成功</span>
              <h3>✅ 货柜查询成功 (${countryText})</h3>
              <p><strong>返回货柜数量:</strong> ${containers.length}</p>
              ${countryCode ? `<p><strong>国家筛选:</strong> ${countryCode}</p>` : ''}
              ${containers.length > 0 ? `<p><strong>第一个货柜:</strong></p><pre>${JSON.stringify(containers[0], null, 2)}</pre>` : '<p>没有找到货柜数据</p>'}
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="result error">
              <span class="status error">失败</span>
              <h3>❌ 查询失败</h3>
              <p><strong>状态码:</strong> ${response.status}</p>
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
        }
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <span class="status error">错误</span>
            <h3>❌ 网络错误</h3>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    async function testStatisticsAPI(countryCode) {
      const resultDiv = document.getElementById('result3');
      const countryText = countryCode ? `国家筛选: ${countryCode}` : '全部国家';
      resultDiv.innerHTML = `<div class="result"><span class="status pending">测试中...</span> 正在查询统计数据 (${countryText})</div>`;

      try {
        const headers = {
          'Content-Type': 'application/json'
        };
        if (countryCode) {
          headers['X-Country-Code'] = countryCode;
        }

        const response = await fetch(`${API_BASE_URL}/containers/statistics`, {
          method: 'GET',
          headers: headers
        });

        const data = await response.json();
        
        if (response.ok && data.success) {
          resultDiv.innerHTML = `
            <div class="result">
              <span class="status success">成功</span>
              <h3>✅ 统计查询成功 (${countryText})</h3>
              ${countryCode ? `<p><strong>国家筛选:</strong> ${countryCode}</p>` : ''}
              <pre>${JSON.stringify(data.data, null, 2)}</pre>
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="result error">
              <span class="status error">失败</span>
              <h3>❌ 查询失败</h3>
              <p><strong>状态码:</strong> ${response.status}</p>
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
        }
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <span class="status error">错误</span>
            <h3>❌ 网络错误</h3>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    function testDatabaseQuery() {
      const resultDiv = document.getElementById('result4');
      resultDiv.innerHTML = `
        <div class="result">
          <h3>📊 数据库查询结果（从SQL脚本）</h3>
          <p><strong>总国家数:</strong> 30</p>
          <p><strong>激活国家数:</strong> 30</p>
          <p><strong>前10个国家:</strong></p>
          <ul>
            <li>US - 美国 (United States)</li>
            <li>CA - 加拿大 (Canada)</li>
            <li>GB - 英国 (United Kingdom)</li>
            <li>DE - 德国 (Germany)</li>
            <li>FR - 法国 (France)</li>
            <li>IT - 意大利 (Italy)</li>
            <li>ES - 西班牙 (Spain)</li>
            <li>NL - 荷兰 (Netherlands)</li>
            <li>BE - 比利时 (Belgium)</li>
            <li>PL - 波兰 (Poland)</li>
          </ul>
          <p><strong>客户表国家分布:</strong></p>
          <ul>
            <li>US - 8个客户</li>
            <li>FR - 1个客户</li>
            <li>RO - 1个客户</li>
            <li>IE - 1个客户</li>
            <li>ES - 1个客户</li>
            <li>IT - 1个客户</li>
            <li>GB - 1个客户</li>
            <li>CA - 1个客户</li>
            <li>DE - 1个客户</li>
          </ul>
          <p><strong>备货单国家分布（前8）:</strong></p>
          <ul>
            <li>英国 - 1774个备货单</li>
            <li>加拿大 - 803个备货单</li>
            <li>德国 - 721个备货单</li>
            <li>美国 - 698个备货单</li>
            <li>法国 - 679个备货单</li>
            <li>意大利 - 567个备货单</li>
            <li>西班牙 - 431个备货单</li>
            <li>爱尔兰 - 10个备货单</li>
          </ul>
        </div>
      `;
    }

    function clearResult(elementId) {
      document.getElementById(elementId).innerHTML = '';
    }
  </script>
</body>
</html>
