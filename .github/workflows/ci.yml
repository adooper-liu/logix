# 合并前底线：单测 + 后端 tsc + 后端 ESLint（TD-007）
# 全仓 validate / npm run quality 含前端 vue-tsc（TD-006）与 markdownlint，见 docs/quality/DEVELOPMENT_DEBT.md
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  quality-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Quality gate (test + backend type-check + backend ESLint)
        run: npm run quality:ci
