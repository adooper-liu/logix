# 合并前底线：单测 + 后端 tsc + 后端 ESLint
# TD-006: 前端 type-check 待清理历史错误后启用
# 完整 validate / quality 含 markdownlint，见 docs/quality/DEVELOPMENT_DEBT.md
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  quality-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Quality gate (test + backend type-check + backend ESLint)
        run: npm run test:backend && npm run type-check:backend && npm run lint:backend

  # Integration tests (non-blocking, for visibility)
  integration-tests:
    runs-on: ubuntu-latest
    continue-on-error: true # 初期允许失败，待测试稳定后移除
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: logix_ci # CI 专用测试数据库
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d logix_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DOTENV_CONFIG_PATH: backend/.env.test
      DB_HOST: postgres # GitHub Actions services 使用服务名作为主机名
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: logix_ci # CI 专用测试数据库（与开发环境隔离）
      REDIS_HOST: redis # GitHub Actions services 使用服务名作为主机名
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h postgres -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Initialize test database with real schema
        run: |
          echo "Initializing CI test database (logix_ci) with real schema..."
          PGPASSWORD=postgres psql -h postgres -U postgres -d logix_ci <<EOF
            -- 执行真实的数据库表结构脚本
            \i backend/sql/schema/03_create_tables.sql
          EOF
          echo "✓ Database schema initialized"

      - name: Import test data from exported files
        run: |
          echo "Importing test data to logix_ci..."
          bash backend/scripts/import-test-data-ci.sh
        continue-on-error: true # 如果测试数据文件不存在，不阻断 CI

      - name: Run integration tests
        run: npm run test:backend:integration
