name: Quality Guardrails

on:
  pull_request:
  push:
    branches: [main, master, develop]

jobs:
  pr-description-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check PR description keyword (non-blocking)
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body || '';
            const requiredKeywords = ['质量门禁执行记录', '回滚方案'];
            const missing = requiredKeywords.filter((keyword) => !body.includes(keyword));

            if (missing.length > 0) {
              for (const keyword of missing) {
                core.warning(`PR 描述缺少关键段落: ${keyword}`);
              }

              core.summary
                .addHeading('PR 描述轻量校验（非阻断）')
                .addRaw(
                  `未检测到以下关键词：${missing.map((k) => `「${k}」`).join('、')}。\n\n请补充 PR 模板中的对应章节，避免“已通过”但无执行记录或无回滚预案。`
                )
                .write();
            } else {
              core.info(`PR 描述已包含全部关键词: ${requiredKeywords.join('、')}`);
            }

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      statistics_changed: ${{ steps.filter.outputs.statistics_changed }}
      integration_changed: ${{ steps.filter.outputs.integration_changed }}
      api_core_changed: ${{ steps.filter.outputs.api_core_changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            statistics_changed:
              - 'backend/src/services/statistics/**'
              - 'backend/src/services/containerStatistics.service.ts'
            integration_changed:
              - 'backend/tests/integration/**'
              - 'backend/jest.integration.config.js'
              - 'backend/package.json'
              - '.github/workflows/quality-guardrails.yml'
            api_core_changed:
              - 'frontend/src/services/api.ts'

  backend-quality-gate:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Blocking gate (backend test + type-check + lint)
        run: npm run test:backend && npm run type-check:backend && npm run lint:backend

      - name: Run statistics consistency check when statistics code changed
        if: needs.detect-changes.outputs.statistics_changed == 'true'
        run: npm run verify:stats-filter

      - name: Reminder when API core changed (manual smoke test required)
        if: needs.detect-changes.outputs.api_core_changed == 'true'
        run: |
          echo "::notice title=Manual check required::frontend/src/services/api.ts changed. Please attach smoke test evidence in PR description."

  integration-tests:
    runs-on: ubuntu-latest
    needs: detect-changes
    continue-on-error: true
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: logix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d logix_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DOTENV_CONFIG_PATH: backend/.env.test
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: logix_test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      REDIS_DB: 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run integration tests (always visible)
        run: npm run test:backend:integration -- --detectOpenHandles --forceExit

      - name: Notice when integration related files changed
        if: needs.detect-changes.outputs.integration_changed == 'true'
        run: |
          echo "::notice title=Integration change detected::Integration-related files changed. Please review test stability before removing continue-on-error."

