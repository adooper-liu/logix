# Grafana TimescaleDB 数据源配置
# Grafana TimescaleDB Datasource Configuration
# 使用标准 PostgreSQL 数据源连接 TimescaleDB

apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    access: proxy
    url: postgres:5432
    database: logix_db
    user: postgres
    isDefault: false
    editable: true
    jsonData:
      postgresVersion: 1500
      timescaledb: true
      sslmode: disable
    secureJsonData:
      password: postgres
